name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x' # Matches the requirement in go.mod

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o aegis-x-linux-amd64 main.go

      - name: Package Release
        run: |
          tar -czvf aegis-x-release.tar.gz aegis-x-linux-amd64 install.sh README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: aegis-x-release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
