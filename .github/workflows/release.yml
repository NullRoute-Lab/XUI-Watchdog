name: Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x' # Matches the requirement in go.mod

      - name: Build Binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o xui-watchdog-linux-amd64 main.go

      - name: Package Release
        run: |
          mkdir -p xui-watchdog-release
          mv xui-watchdog-linux-amd64 install.sh README.md xui-watchdog-release/
          tar -czvf xui-watchdog-release.tar.gz xui-watchdog-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: XUI-Watchdog v1.0.${{ github.run_number }}
          files: xui-watchdog-release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
